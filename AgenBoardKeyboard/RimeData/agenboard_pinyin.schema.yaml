schema:
  schema_id: agenboard_pinyin
  name: AgenBoard 拼音
  version: "1.0"
  author:
    - AgenBoard
    - Rime Ice contributors
  description: |
    基于雾凇拼音词库的 AgenBoard 简体拼音方案。
    只使用 librime 内置组件，适合在 iOS 键盘扩展中离线运行。

switches:
  - name: ascii_mode
    reset: 0
    states: [中文, 西文]

engine:
  processors:
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - erase/^xx$/

translator:
  dictionary: rime_ice
  prism: agenboard_pinyin
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  db_class: userdb
  spelling_hints: 8
  initial_quality: 1.2

punctuator:
  half_shape:
    ",": "，"
    ".": "。"
    "?": "？"
    "!": "！"
    ":": "："
    ";": "；"
