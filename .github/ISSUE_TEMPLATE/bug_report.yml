name: Bug 报告
description: 报告可以稳定复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 请勿在公开 Issue 中粘贴 API Key、录音、转写内容或其他个人数据。安全漏洞请使用私密安全公告。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？期望行为是什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      description: iOS、Xcode、设备或模拟器版本
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可提供已脱敏日志或截图。
