name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator:
    name: iOS Simulator
    runs-on: macos-26
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate metadata and scripts
        run: |
          bash -n scripts/*.sh
          ./scripts/check-public-config.sh
          plutil -lint AgenBoard/PrivacyInfo.xcprivacy
          plutil -lint AgenBoardKeyboard/PrivacyInfo.xcprivacy
          plutil -lint rime-data.lock.plist

      - name: Fetch verified Rime data
        run: ./scripts/fetch-rime-data.sh

      - name: Build
        run: xcodebuild -project AgenBoard.xcodeproj -scheme AgenBoard -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
